<!DOCTYPE html>
<html  lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Siswa</title>
  <!-- Font Awesome --> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"> 
  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#87CEEB,#E0F7FF);
    padding:20px;
    position:relative;
    overflow:hidden;
}
header{
    text-align:center;
    margin-bottom:20px;
}

header h1{
    color:white;
    font-size:42px;
    font-weight:700;
}

header p{
    color:white;
    margin-top:8px;
}

.card{
    width:380px;
    background:#7EC8E3;
    border-radius:25px;
    padding:30px;
    text-align:center;
    color:white;
    border:3px solid rgba(255,255,255,0.5);
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    position:relative;
    z-index:1;
}
   body::before{
    content{
    content:"";
    position:absolute;
    background:rgba(255,255,255,0.7);
    border-radius:50%;
    z-index:0;
}

body::before{
    width:180px;
    height:60px;
    top:60px;
    left:80px;
    box-shadow:
        50px 0 white,
        100px 10px white,
        30px -20px white,
        80px -25px white;
}

body::after{
    width:150px;
    height:50px;
    bottom:100px;
    right:100px;
    box-shadow:
        40px 0 white,
        80px 10px white,
        20px -15px white,
        70px -20px white;
}

.profile-img{
    width:130px;
    height:130px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
}

.card h2{
    margin-bottom:15px;
}

.desc{
    line-height:1.8;
}

.quote{
    margin-top:20px;
    font-style:italic;
}
.social{
    margin-top:25px;
}

.social a{
    color:white;
    font-size:28px;
    margin:0 10px;
    text-decoration:none;
    transition:0.3s;
}

.social a:hover{
    transform:scale(1.2);
}
</style>
</head> 

<body>

  <!-- HEADER -->
  <header> 
   <h1>PROFIL DIRI SISWA</h1> 
    <p>✨ Kreatif • Modern • Informatika ✨</p> 
  </header> 

   <!-- CARD --> 
  <div class="card"> 
 
    <!-- Foto --> 
    <img src="foto nancy koding.jpeg" 
    alt="Foto Profil"
     class="profile-img"> 
    <!-- Nama --> 
   <h2>Dzakira Inayah Nancy</h2>
    
    <!-- Deskripsi --> 
    <div class="desc"> 
      <p><b>Kelas:</b> XA KEPERAWATAN</p> 
      <p><b>Sekolah:</b> SMKS Kesehatan Yannas Husada 
Bangkalan</p> 
      <p><b>Hobi:</b> Memasak dan Menyanyi</p> 
    </div> 
    <!-- Quote --> 
    <div class="quote"> 
      "AI bukan pengganti usaha dalam belajar, melainkan alat yang membantu kita
      belajar lebih cepat," 
    </div>
    <!-- Sosial Media --> 
    <div class="social"> 
      <a href="#" title="Instagram"> 
        <i class="fab fa-instagram"></i> 
      </a> 
      <a href="#" title="TikTok"> 
        <i class="fab fa-tiktok"></i> 
      </a> 
      <a href="#" title="WhatsApp"> 
        <i class="fab fa-whatsapp"></i> 
      </a> 
      <a href="#" title="Github"> 
        <i class="fab fa-github"></i> 
      </a>
